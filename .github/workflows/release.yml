name: CI Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_VERSION: 10.0.x
  PROJECT_PATH: src/Yndx/Yndx.csproj
  APP_NAME: Yndx

jobs:
  publish:
    name: Publish ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-x64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Publish self-contained app
        run: >-
          dotnet publish ${{ env.PROJECT_PATH }}
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=None
          -p:DebugSymbols=false
          -o artifacts/publish/${{ matrix.rid }}

      - name: Archive publish output
        shell: pwsh
        run: |
          $tagOrSha = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } else { "${{ github.sha }}".Substring(0, 7) }
          $archiveName = "${{ env.APP_NAME }}-$tagOrSha-${{ matrix.rid }}.zip"
          $publishDir = Join-Path $env:GITHUB_WORKSPACE "artifacts/publish/${{ matrix.rid }}"
          $archivePath = Join-Path $env:GITHUB_WORKSPACE "artifacts/$archiveName"
          $expectedExecutable = if ("${{ matrix.rid }}" -like "win-*") { "${{ env.APP_NAME }}.exe" } else { "${{ env.APP_NAME }}" }
          $executablePath = Join-Path $publishDir $expectedExecutable

          if (Test-Path $archivePath) {
            Remove-Item $archivePath -Force
          }

          if (-not (Test-Path $executablePath)) {
            $files = Get-ChildItem -Path $publishDir -File
            throw "Expected single-file executable '$expectedExecutable' was not found. Found: $($files.Name -join ', ')"
          }

          Compress-Archive -Path $executablePath -DestinationPath $archivePath

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: publish-${{ matrix.rid }}
          path: artifacts/*.zip
          if-no-files-found: error

  release:
    name: Create GitHub release
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs: publish
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: publish-*
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*.zip
          generate_release_notes: true
